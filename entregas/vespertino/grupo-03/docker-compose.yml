services:
  mysql:
    image: mysql:8.0
    container_name: escola_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: escola_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Alterado para apontar para a pasta 'base' inteira
      - ../../../base:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./app/back
    container_name: escola_backend
    restart: always
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: escola_db
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./app/front
    container_name: escola_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data: